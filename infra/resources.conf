# Configuração de recursos para importação automática
# Formato: "type|terraform_resource_name|aws_resource_name|check_function"
#
# type: Tipo do recurso Terraform (aws_iam_role, aws_sqs_queue, etc.)
# terraform_resource_name: Nome do recurso no código Terraform
# aws_resource_name: Nome real do recurso na AWS
# check_function: Função bash para verificar se o recurso existe
#
# Recursos atuais do projeto:
RESOURCES=(
    "aws_iam_role|lambda_sqs_role|order-processing-lambda-sqs-role|check_iam_role"
    "aws_iam_policy|lambda_sqs_policy|order-processing-lambda-sqs-policy|check_iam_policy"
    "aws_sqs_queue|order_queue|order-processing-queue|check_sqs_queue"
    "aws_lambda_function|process_queue|order-processing-process-queue|check_lambda_function"
)

# Para adicionar novos recursos, simplesmente adicione uma linha no array RESOURCES
# Exemplos de recursos suportados:
# "aws_dynamodb_table|my_table|my-table-name|check_dynamodb_table"
# "aws_s3_bucket|my_bucket|my-unique-bucket-name|check_s3_bucket"
# "aws_cloudwatch_log_group|my_log_group|/aws/lambda/my-function|check_cloudwatch_log_group"
#
# Tipos suportados atualmente:
# - aws_iam_role, aws_iam_policy, aws_sqs_queue, aws_lambda_function
# - aws_dynamodb_table, aws_s3_bucket, aws_cloudwatch_log_group