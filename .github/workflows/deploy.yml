name: Deploy Order Processing

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.0

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive infra/

      - name: Terraform Init (no backend)
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 black

      - name: Run Black # Verifica se o código está formatado corretamente
        run: black --check lambdas/
        continue-on-error: true

      - name: Run Flake8 # Verifica problemas de estilo e qualidade do código. Define o limite de comprimento da linha para 100 caracteres
        run: flake8 lambdas/ --max-line-length=100
        continue-on-error: true

      - name: Run Pylint # Verifica problemas de qualidade do código e possíveis erros.
        run: pylint lambdas/ --fail-under=7.5 # Define uma pontuação mínima para falhar a execução. Ajuste conforme necessário.
        continue-on-error: false # Falha se o código tiver problemas de qualidade

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [validate, lint]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan

  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Necessário para criar commits/branches
      pull-requests: write  # Necessário para criar o PR
    needs: [validate, lint]
    if: github.ref == 'refs/heads/develop'

    steps:
      # ESSA LINHA É OBRIGATÓRIA EM TODOS OS JOBS QUE USAM GIT
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Baixa todo o histórico para comparar branches

      - name: Create Pull Request with GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Agora o diretório .git existe e o comando vai funcionar
          gh pr create \
            --base main \
            --head develop \
            --title "Automated PR: Develop to Main" \
            --body "PR automático após passar no job de Validação." || echo "PR já existe ou as branches são iguais."
